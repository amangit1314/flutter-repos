name: flutter_widget_catelog
description: A collection of widgets for building uis.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  cupertino_icons: ^1.0.2
  device_preview: ^1.0.0
  eva_icons_flutter: ^3.1.0
  flutter:
    sdk: flutter
  flutter_svg: ^1.0.3
  get: ^4.6.3
  get_it: ^7.6.4
  get_storage: ^2.0.3
  google_fonts: ^3.0.1
  hive: ^2.2.3
  iconly: ^1.0.1
  injectable: ^2.1.1
  liquid_swipe: ^3.0.0
  path_provider: ^2.1.1
  provider: ^6.0.2
  simple_animations: ^4.0.2
  zoom_tap_animation: ^1.1.0

dev_dependencies:
  build_runner: null
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^2.0.1
  flutter_test:
    sdk: flutter
  freezed: any
  hive_generator: ^2.0.0
  injectable_generator: null
  json_serializable: ^6.1.4

flutter:
  uses-material-design: true

  assets:
    - assets/design.png
    - assets/3dprinting.jpg
    - assets/metaverse.webp
    - assets/convo_logo.png
